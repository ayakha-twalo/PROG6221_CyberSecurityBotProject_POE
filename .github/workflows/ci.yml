name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore CybersecurityChatbot.sln

      - name: Build
        run: dotnet build CybersecurityChatbot.sln --configuration Release

      - name: Test
        run: dotnet test CybersecurityChatbot.sln --configuration Release