name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repo structure (debug)
        run: dir

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore solution
        run: dotnet restore CybersecurityChatbot/CybersecurityChatbot.sln

      - name: Build solution
        run: dotnet build CybersecurityChatbot/CybersecurityChatbot.sln --configuration Release --no-restore

      - name: Test (optional)
        run: dotnet test CybersecurityChatbot/CybersecurityChatbot.sln --no-build
        continue-on-error: true

      - name: Format check (optional)
        run: dotnet format CybersecurityChatbot/CybersecurityChatbot.sln --verify-no-changes
        continue-on-error: true