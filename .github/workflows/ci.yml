name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository structure (CRITICAL DEBUG)
        run: dir

      - name: Search for solution file (CRITICAL DEBUG)
        run: Get-ChildItem -Recurse *.sln

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Show .NET info
        run: dotnet --info

      - name: Restore solution (auto-detect)
        run: |
          dotnet restore **/*.sln --verbosity detailed

      - name: Build solution (auto-detect)
        run: |
          dotnet build **/*.sln --configuration Release --verbosity detailed

      - name: Run tests (non-blocking)
        run: |
          dotnet test **/*.sln --no-build --verbosity normal
        continue-on-error: true

      - name: Format check (non-blocking)
        run: |
          dotnet format **/*.sln --verify-no-changes
        continue-on-error: true