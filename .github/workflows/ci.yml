name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Show repository files (debug)
        run: dir

      - name: Restore solution
        run: dotnet restore ./CybersecurityChatbot.sln -v diag

      - name: Build solution
        run: dotnet build ./CybersecurityChatbot.sln --configuration Release --no-restore

      - name: Run tests (if any)
        run: dotnet test ./CybersecurityChatbot.sln --configuration Release --no-build
        continue-on-error: true

      - name: Check formatting (optional)
        run: dotnet format ./CybersecurityChatbot.sln --verify-no-changes
        continue-on-error: true