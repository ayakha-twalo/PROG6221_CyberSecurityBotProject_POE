name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repo files (DEBUG)
        run: dir

      - name: Find solution file
        id: find_sln
        shell: pwsh
        run: |
          $sln = Get-ChildItem -Recurse -Filter *.sln | Select-Object -First 1
          echo "Solution found: $sln"
          echo "sln_path=$($sln.FullName)" >> $env:GITHUB_OUTPUT

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Show .NET info
        run: dotnet --info

      - name: Restore
        run: dotnet restore "${{ steps.find_sln.outputs.sln_path }}" --verbosity detailed

      - name: Build
        run: dotnet build "${{ steps.find_sln.outputs.sln_path }}" --configuration Release --no-restore

      - name: Test (non-blocking)
        run: dotnet test "${{ steps.find_sln.outputs.sln_path }}" --no-build
        continue-on-error: true

      - name: Format check (non-blocking)
        run: dotnet format "${{ steps.find_sln.outputs.sln_path }}" --verify-no-changes
        continue-on-error: true