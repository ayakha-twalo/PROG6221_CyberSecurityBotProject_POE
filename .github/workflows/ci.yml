name: CI Pipeline

on:
  push:
  pull_request:

jobs:

  restore:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Restore dependencies
        run: dotnet restore

  build:
    runs-on: windows-latest
    needs: restore
    steps:
      - uses: actions/checkout@v4
      - name: Build project
        run: dotnet build --configuration Release

  test:
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: dotnet test --no-build || exit 0

  format:
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting
        run: dotnet format --verify-no-changes || exit 0

  analyze:
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Basic analysis
        run: dotnet build -warnaserror:false
