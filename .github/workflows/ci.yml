name: Build WPF App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore CybersecurityChatbot/CybersecurityChatbot.csproj

    - name: Build
      run: dotnet build CybersecurityChatbot/CybersecurityChatbot.csproj --configuration Release
